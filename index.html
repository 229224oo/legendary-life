<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>考拉传奇人生 - 链上传奇DApp</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Microsoft YaHei', 'SimHei', sans-serif;
      min-height: 100vh;
      background: 
        radial-gradient(ellipse at 20% 10%, rgba(255, 215, 0, 0.15) 0%, transparent 40%),
        radial-gradient(ellipse at 80% 20%, rgba(255, 69, 0, 0.2) 0%, transparent 40%),
        radial-gradient(ellipse at 50% 80%, rgba(138, 43, 226, 0.25) 0%, transparent 45%),
        radial-gradient(ellipse at 10% 90%, rgba(0, 191, 255, 0.1) 0%, transparent 35%),
        linear-gradient(135deg, #0d0515 0%, #1a0a2e 25%, #0f172a 50%, #1e1b4b 75%, #0d0515 100%);
      color: #e0e0e0;
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: 
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(255, 215, 0, 0.02) 2px,
          rgba(255, 215, 0, 0.02) 4px
        ),
        repeating-linear-gradient(
          90deg,
          transparent,
          transparent 2px,
          rgba(138, 43, 226, 0.02) 2px,
          rgba(138, 43, 226, 0.02) 4px
        );
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: 
        radial-gradient(circle at 30% 30%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
        radial-gradient(circle at 70% 70%, rgba(255, 69, 0, 0.05) 0%, transparent 50%);
      animation: bgFloat 20s ease-in-out infinite;
      pointer-events: none;
      z-index: 0;
    }

    @keyframes bgFloat {
      0%, 100% { transform: translate(0, 0) rotate(0deg); }
      33% { transform: translate(20px, -20px) rotate(1deg); }
      66% { transform: translate(-20px, 20px) rotate(-1deg); }
    }

    .navbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 70px;
      background: 
        linear-gradient(180deg, rgba(20, 10, 40, 0.95) 0%, rgba(10, 5, 20, 0.9) 100%);
      border-bottom: 2px solid transparent;
      border-image: linear-gradient(90deg, transparent, #ffd700, #ff6b00, #ffd700, transparent) 1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 25px;
      z-index: 1000;
      backdrop-filter: blur(20px);
      box-shadow: 
        0 4px 30px rgba(0, 0, 0, 0.5),
        inset 0 1px 0 rgba(255, 215, 0, 0.1);
    }

    .nav-logo {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-shadow: 0 0 30px rgba(255, 215, 0, 0.5);
      position: relative;
      animation: logoGlow 3s ease-in-out infinite;
    }

    @keyframes logoGlow {
      0%, 100% { filter: drop-shadow(0 0 10px rgba(255, 215, 0, 0.5)); }
      50% { filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.8)); }
    }

    .nav-wallet {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .wallet-address {
      font-size: 12px;
      color: #ffd700;
      font-family: monospace;
      max-width: 150px;
      overflow: hidden;
      text-overflow: ellipsis;
      background: rgba(255, 215, 0, 0.1);
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid rgba(255, 215, 0, 0.3);
    }

    .sound-btn {
      width: 42px;
      height: 42px;
      border: none;
      border-radius: 50%;
      background: 
        linear-gradient(135deg, rgba(255, 215, 0, 0.2), rgba(255, 69, 0, 0.2));
      color: #ffd700;
      font-size: 18px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(255, 215, 0, 0.3);
      box-shadow: 
        0 4px 15px rgba(255, 215, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .sound-btn:hover {
      transform: translateY(-3px) scale(1.05);
      box-shadow: 
        0 8px 25px rgba(255, 215, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
      border-color: #ffd700;
    }

    .btn {
      padding: 12px 24px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
      transition: left 0.5s;
    }

    .btn:hover::before {
      left: 100%;
    }

    .btn-connect {
      background: 
        linear-gradient(135deg, #ffd700 0%, #ff8c00 50%, #ffd700 100%);
      color: #1a0a00;
      box-shadow: 
        0 4px 20px rgba(255, 215, 0, 0.4),
        0 8px 40px rgba(255, 140, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      text-shadow: 0 1px 0 rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 215, 0, 0.5);
    }

    .btn-connect:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 8px 30px rgba(255, 215, 0, 0.5),
        0 12px 50px rgba(255, 140, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.5),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn-connect:active {
      transform: translateY(-1px);
    }

    .btn-primary {
      background: 
        linear-gradient(135deg, #ff6b00 0%, #ff4500 50%, #ff6b00 100%);
      color: #fff;
      box-shadow: 
        0 4px 20px rgba(255, 107, 0, 0.4),
        0 8px 40px rgba(255, 69, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(255, 107, 0, 0.5);
    }

    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 8px 30px rgba(255, 107, 0, 0.5),
        0 12px 50px rgba(255, 69, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn-primary:active {
      transform: translateY(-1px);
    }

    .btn-partner {
      background: 
        linear-gradient(135deg, #22c55e 0%, #16a34a 50%, #22c55e 100%);
      color: #fff;
      box-shadow: 
        0 4px 20px rgba(34, 197, 94, 0.4),
        0 8px 40px rgba(22, 163, 74, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(34, 197, 94, 0.5);
    }

    .btn-partner:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 8px 30px rgba(34, 197, 94, 0.5),
        0 12px 50px rgba(22, 163, 74, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn-game {
      background: 
        linear-gradient(135deg, #7c3aed 0%, #a855f7 50%, #7c3aed 100%);
      color: #fff;
      box-shadow: 
        0 4px 20px rgba(124, 58, 237, 0.4),
        0 8px 40px rgba(168, 85, 247, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.3),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(124, 58, 237, 0.5);
    }

    .btn-game:hover {
      transform: translateY(-3px);
      box-shadow: 
        0 8px 30px rgba(124, 58, 237, 0.5),
        0 12px 50px rgba(168, 85, 247, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.4),
        inset 0 -2px 0 rgba(0, 0, 0, 0.2);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none !important;
      filter: grayscale(30%);
    }

    .main-container {
      margin-top: 90px;
      padding: 20px;
      max-width: 850px;
      margin-left: auto;
      margin-right: auto;
      position: relative;
      z-index: 1;
    }

    .status-card {
      background: 
        linear-gradient(135deg, rgba(20, 10, 40, 0.8) 0%, rgba(30, 20, 60, 0.8) 100%);
      border-radius: 20px;
      padding: 25px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      margin-bottom: 25px;
      backdrop-filter: blur(20px);
      position: relative;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .status-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ffd700, transparent);
    }

    .status-header {
      font-size: 20px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .status-header::before {
      content: '\26A1';
      font-size: 24px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.8; }
    }

    .balance-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
    }

    .balance-item {
      background: 
        linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(255, 69, 0, 0.05) 100%);
      padding: 18px;
      border-radius: 15px;
      text-align: center;
      border: 1px solid rgba(255, 215, 0, 0.2);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
      box-shadow: 
        0 4px 15px rgba(0, 0, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .balance-item::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(255, 215, 0, 0.1) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .balance-item:hover {
      transform: translateY(-5px);
      border-color: rgba(255, 215, 0, 0.5);
      box-shadow: 
        0 10px 30px rgba(255, 215, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .balance-item:hover::before {
      opacity: 1;
    }

    .balance-label {
      font-size: 12px;
      color: #9ca3af;
      margin-bottom: 8px;
      position: relative;
      z-index: 1;
    }

    .balance-value {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ffd700 0%, #ff8c00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-family: monospace;
      position: relative;
      z-index: 1;
      text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    .recharge-section {
      background: 
        linear-gradient(135deg, rgba(20, 10, 40, 0.8) 0%, rgba(40, 20, 30, 0.8) 100%);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(255, 69, 0, 0.2);
      margin-bottom: 25px;
      position: relative;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .recharge-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #ff6b00, transparent);
    }

    .section-title {
      font-size: 22px;
      font-weight: bold;
      background: linear-gradient(135deg, #ff6b00 0%, #ffd700 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 25px;
      text-align: center;
      text-shadow: 0 0 30px rgba(255, 107, 0, 0.3);
      position: relative;
    }

    .section-title::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #ff6b00, transparent);
      margin: 10px auto 0;
      border-radius: 2px;
    }

    .input-group {
      margin-bottom: 20px;
    }

    .input-label {
      font-size: 13px;
      color: #9ca3af;
      margin-bottom: 10px;
      display: block;
      font-weight: 500;
    }

    .input-field {
      width: 100%;
      padding: 14px 18px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 12px;
      background: 
        linear-gradient(135deg, rgba(0, 0, 0, 0.4) 0%, rgba(20, 10, 30, 0.4) 100%);
      color: #ffd700;
      font-size: 14px;
      font-family: monospace;
      transition: all 0.3s;
      box-shadow: 
        inset 0 2px 5px rgba(0, 0, 0, 0.3),
        0 1px 0 rgba(255, 255, 255, 0.05);
    }

    .input-field:focus {
      outline: none;
      border-color: #ffd700;
      box-shadow: 
        inset 0 2px 5px rgba(0, 0, 0, 0.3),
        0 0 20px rgba(255, 215, 0, 0.2);
      background: 
        linear-gradient(135deg, rgba(0, 0, 0, 0.5) 0%, rgba(20, 10, 30, 0.5) 100%);
    }

    .presets {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .preset-btn {
      flex: 1;
      min-width: 80px;
      padding: 10px;
      border: 1px solid rgba(255, 215, 0, 0.2);
      border-radius: 10px;
      background: rgba(255, 215, 0, 0.05);
      color: #e0e0e0;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .preset-btn:hover {
      border-color: rgba(255, 215, 0, 0.5);
      background: rgba(255, 215, 0, 0.1);
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.1);
    }

    .preset-btn.active {
      background: 
        linear-gradient(135deg, rgba(255, 215, 0, 0.2) 0%, rgba(255, 69, 0, 0.2) 100%);
      border-color: #ffd700;
      color: #ffd700;
      box-shadow: 
        0 0 20px rgba(255, 215, 0, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .partner-section {
      background: 
        linear-gradient(135deg, rgba(20, 40, 20, 0.8) 0%, rgba(10, 30, 20, 0.8) 100%);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(34, 197, 94, 0.2);
      margin-bottom: 25px;
      position: relative;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .partner-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
    }

    .partner-section .section-title {
      background: linear-gradient(135deg, #22c55e 0%, #86efac 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .partner-section .section-title::after {
      background: linear-gradient(90deg, transparent, #22c55e, transparent);
    }

    .partner-info {
      background: rgba(34, 197, 94, 0.1);
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    .partner-info p {
      margin-bottom: 10px;
      color: #86efac;
      font-size: 14px;
    }

    .partner-info p:last-child {
      margin-bottom: 0;
    }

    .character-section {
      background: 
        linear-gradient(135deg, rgba(30, 20, 60, 0.8) 0%, rgba(50, 30, 80, 0.8) 100%);
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(138, 43, 226, 0.2);
      margin-bottom: 25px;
      position: relative;
      box-shadow: 
        0 10px 40px rgba(0, 0, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .character-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 30px;
      right: 30px;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
    }

    .character-info {
      display: flex;
      gap: 25px;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 25px;
      border-bottom: 1px solid rgba(138, 43, 226, 0.2);
    }

    .character-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: 
        linear-gradient(135deg, #8b5cf6 0%, #ec4899 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      box-shadow: 
        0 0 30px rgba(139, 92, 246, 0.5),
        inset 0 2px 0 rgba(255, 255, 255, 0.3);
      border: 3px solid rgba(139, 92, 246, 0.5);
    }

    .character-detail {
      flex: 1;
    }

    .character-name {
      font-size: 20px;
      font-weight: bold;
      color: #fff;
      margin-bottom: 8px;
      text-shadow: 0 0 20px rgba(139, 92, 246, 0.5);
    }

    .character-class {
      color: #a78bfa;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .character-level {
      color: #ffd700;
      font-size: 16px;
      font-weight: bold;
    }

    .character-stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-item {
      background: rgba(139, 92, 246, 0.1);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(139, 92, 246, 0.2);
      transition: all 0.3s;
    }

    .stat-item:hover {
      transform: translateY(-3px);
      border-color: rgba(139, 92, 246, 0.5);
      box-shadow: 0 5px 20px rgba(139, 92, 246, 0.2);
    }

    .stat-label {
      font-size: 11px;
      color: #9ca3af;
      margin-bottom: 5px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: #fff;
    }

    .exp-bar {
      width: 100%;
      height: 12px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 8px;
      box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.4);
    }

    .exp-fill {
      height: 100%;
      background: 
        linear-gradient(90deg, #8b5cf6 0%, #ec4899 50%, #8b5cf6 100%);
      background-size: 200% 100%;
      border-radius: 6px;
      transition: width 0.5s;
      animation: expShine 3s linear infinite;
      box-shadow: 0 0 10px rgba(139, 92, 246, 0.5);
    }

    @keyframes expShine {
      0% { background-position: 0% 50%; }
      100% { background-position: 200% 50%; }
    }

    .exp-text {
      font-size: 12px;
      color: #9ca3af;
      text-align: center;
    }

    .game-tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .game-tab {
      flex: 1;
      min-width: 100px;
      padding: 12px 20px;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.2);
      border-radius: 12px;
      color: #a78bfa;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      text-align: center;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .game-tab:hover {
      border-color: rgba(139, 92, 246, 0.5);
      background: rgba(139, 92, 246, 0.15);
      transform: translateY(-2px);
    }

    .game-tab.active {
      background: 
        linear-gradient(135deg, #7c3aed 0%, #a855f7 100%);
      color: #fff;
      border-color: #a855f7;
      box-shadow: 
        0 4px 20px rgba(124, 58, 237, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.3);
    }

    .game-panel {
      display: none;
    }

    .game-panel.active {
      display: block;
      animation: fadeInUp 0.5s ease-out;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .equipment-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
      gap: 12px;
    }

    .equipment-item {
      background: 
        linear-gradient(135deg, rgba(30, 20, 50, 0.8) 0%, rgba(40, 30, 70, 0.8) 100%);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(139, 92, 246, 0.2);
      cursor: pointer;

        inset 0 1px 0 rgba(255, 255, 255, 0.1);

      right: 30px;
      height: 2px;

    }

      border-bottom: none;
    }

    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(5px);
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 3px solid rgba(255, 215, 0, 0.2);
      border-top-color: #ffd700;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .toast {
      position: fixed;
      top: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(-100px);
      padding: 15px 30px;
      border-radius: 12px;
      color: #fff;
      font-size: 14px;
      font-weight: bold;
      z-index: 3000;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .toast.success {
      background: 
        linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
    }

    .toast.error {
      background: 
        linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
      box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
    }

    .modal {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(10px);
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: 
        linear-gradient(135deg, rgba(30, 20, 60, 0.95) 0%, rgba(20, 10, 40, 0.95) 100%);
      border-radius: 20px;
      padding: 30px;
      max-width: 400px;
      width: 90%;
      border: 2px solid rgba(255, 215, 0, 0.3);
      position: relative;
      box-shadow: 
        0 20px 60px rgba(0, 0, 0, 0.6),
        0 0 100px rgba(139, 92, 246, 0.2),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      animation: modalIn 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    @keyframes modalIn {
      from {
        opacity: 0;
        transform: scale(0.9) translateY(20px);
      }
      to {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .modal-close {
      position: absolute;
      top: 15px;
      right: 15px;
      width: 32px;
      height: 32px;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: #9ca3af;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .modal-close:hover {
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
    }

    .class-select {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin: 20px 0;
    }

    .class-option {
      padding: 20px;
      border: 2px solid rgba(139, 92, 246, 0.3);
      border-radius: 15px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
      background: rgba(139, 92, 246, 0.1);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
    }

    .class-option:hover {
      border-color: rgba(139, 92, 246, 0.6);
      transform: translateY(-5px);
      box-shadow: 0 10px 30px rgba(139, 92, 246, 0.3);
    }

    .class-option.selected {
      border-color: #a855f7;
      background: 
        linear-gradient(135deg, rgba(124, 58, 237, 0.3) 0%, rgba(168, 85, 247, 0.2) 100%);
      box-shadow: 0 0 30px rgba(124, 58, 237, 0.4);
    }

    .class-icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .class-name {
      font-weight: bold;
      color: #fff;
      margin-bottom: 5px;
    }

    .class-desc {
      font-size: 11px;
      color: #9ca3af;
    }

    .slash-effect {
      position: absolute;
      width: 80px;
      height: 5px;
      background: linear-gradient(90deg, #ff4500, #ffd700, transparent);
      border-radius: 3px;
      box-shadow: 0 0 15px #ff4500, 0 0 30px #ffd700;
      z-index: 100;
      animation: slash 0.4s ease-out forwards;
    }

    @keyframes slash {
      0% { transform: translateX(0) rotate(0deg); opacity: 1; }
      50% { transform: translateX(80px) rotate(45deg); opacity: 0.8; }
      100% { transform: translateX(150px) rotate(90deg); opacity: 0; }
    }

    .magic-circle {
      position: absolute;
      width: 100px;
      height: 100px;
      border: 3px solid #9333ea;
      border-radius: 50%;
      z-index: 100;
      animation: magicCircle 0.6s ease-out forwards;
      box-shadow: 0 0 20px #9333ea, inset 0 0 20px rgba(147, 51, 234, 0.3);
    }

    @keyframes magicCircle {
      0% { transform: scale(0) rotate(0deg); opacity: 1; }
      50% { transform: scale(1.2) rotate(180deg); opacity: 0.8; }
      100% { transform: scale(1) rotate(360deg); opacity: 0; }
    }

    .arrow-projectile {
      position: absolute;
      font-size: 20px;
      z-index: 100;
      animation: arrowFly 0.5s linear forwards;
      filter: drop-shadow(0 0 10px #22c55e);
    }

    @keyframes arrowFly {
      0% { transform: translateX(0); opacity: 1; }
      100% { transform: translateX(300px); opacity: 0; }
    }

    .shake {
      animation: shake 0.2s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-10px); }
      75% { transform: translateX(10px); }
    }

    @media (max-width: 600px) {
      .navbar {
        height: 60px;
        padding: 0 15px;
      }

      .nav-logo {
        font-size: 18px;
      }

      .wallet-address {
        display: none;
      }

      .main-container {
        margin-top: 75px;
        padding: 15px;
      }

      .balance-grid {
        grid-template-columns: 1fr;
      }

      .character-stats {
        grid-template-columns: repeat(2, 1fr);
      }

      .game-tabs {
        flex-wrap: wrap;
      }

      .leaderboard-header,
      .leaderboard-list li {
        grid-template-columns: 40px 1fr 60px 50px 60px;
        font-size: 11px;
      }

      .quest-item, .boss-item {
        flex-direction: column;
        gap: 15px;
        align-items: flex-start;
      }

      .quest-action, .boss-action {
        width: 100%;
      }

      .quest-action .btn, .boss-action .btn {
        width: 100%;
      }
    }
  </style>
</head>

      showLoading(true);

        provider = new ethers.providers.Web3Provider(window.ethereum);
        await provider.send('eth_requestAccounts', []);
        signer = provider.getSigner();
        userAddress = await signer.getAddress();

        if (network.chainId !== 56) {
          showToast('请切换到BSC主网', 'error');
          showLoading(false);

        showToast('请输入有效金额', 'error');
        return;
      }

      showLoading(true);

        const decimals = await koalaContract.decimals();
        const amountWei = ethers.utils.parseUnits(amount, decimals);
        
        const allowance = await koalaContract.allowance(userAddress, RECEIVE_ADDRESS);

          showToast('正在授权传奇人生币...', 'success');

        showToast('正在转账传奇人生币...', 'success');

        await tx.wait();

    function getPower(char) {
      return char.atk * 2 + char.def * 1.5 + char.hp * 0.1 + char.level * 10;
    }

    function renderLeaderboard() {
      const list = document.getElementById('leaderboardList');
      const myRankDisplay = document.getElementById('myRankDisplay');
      
      const sortedData = [...leaderboardData].sort((a, b) => getPower(b) - getPower(a));
      
      let html = '';
      sortedData.forEach((player, index) => {
        const rank = index + 1;
        const power = Math.floor(getPower(player));
        const cls = classData[player.class];
        const topClass = rank <= 3 ? `top-${rank}` : '';
        
        html += `
          <li class="leaderboard-item ${topClass}">
            <span class="rank-number ${topClass}">${rank}</span>
            <span>${player.name}</span>
            <span>${cls.icon} ${cls.name}</span>
            <span>Lv.${player.level}</span>
            <span>${power}</span>
          </li>
        `;
      });
      
      list.innerHTML = html;
      
      const myPower = Math.floor(getPower(character));
      const myRank = sortedData.filter(p => getPower(p) > myPower).length + 1;
      const myCls = classData[character.class];
      
      myRankDisplay.innerHTML = `
        我的排名: 第 ${myRank} 名 | ${myCls.icon} ${character.name} | Lv.${character.level} | 战力: ${myPower}
      `;
    }

    // 合成装备
    async function synthesize(equipId) {
      const equip = equipmentData.find(e => e.id === equipId);
      if (!equip) return;

      if (character.level < equip.level) {
        showToast(`需要达到Lv.${equip.level}才能合成`, 'error');
        return;
      }

      if (currentKoalaBalance < equip.cost) {
        showToast('传奇币余额不足，请先充值', 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const costAmount = ethers.utils.parseUnits(equip.cost.toString(), decimals);
        
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, costAmount);
        await tx.wait();

        inventory.push(equip);
        character.atk += equip.atk || 0;
        character.def += equip.def || 0;
        character.hp += equip.hp || 0;
        character.exp += 50;

        updateCharacter();
        updateInventory();
        await updateBalances();

        showToast(`成功合成 ${equip.name}！`, 'success');
      } catch (e) {
        showToast('合成失败: ' + e.message, 'error');
      }
      showLoading(false);
    }

    // 执行任务
    async function doQuest(questId) {
      const quest = questData.find(q => q.id === questId);
      if (!quest) return;

      if (currentKoalaBalance < quest.cost) {
        showToast('传奇币余额不足，请先充值', 'error');
        return;
      }

      showLoading(true);
      try {
        const decimals = await koalaContract.decimals();
        const costAmount = ethers.utils.parseUnits(quest.cost.toString(), decimals);
        
        const tx = await koalaContract.transfer(RECEIVE_ADDRESS, costAmount);
        await tx.wait();

        character.exp += 100;
        if (character.exp >= character.level * 200) {
          character.level++;
          character.atk += 5;
          character.def += 3;
          character.hp += 20;
          showToast(`升级！当前Lv.${character.level}`, 'success');
        }

        updateCharacter();
        await updateBalances();

        showToast(`任务 ${quest.name} 完成！`, 'success');
      } catch (e) {
        showToast('任务失败: ' + e.message, 'error');
      }
      showLoading(false);
    }

    function showSkillEffect() {
      const gameSection = document.querySelector('.game-section');
      if (!gameSection) return;

      const charClass = character.class || 'warrior';
      const effectContainer = document.createElement('div');
      effectContainer.style.position = 'relative';
      effectContainer.style.width = '100%';
      effectContainer.style.height = '200px';
      effectContainer.style.display = 'flex';
      effectContainer.style.justifyContent = 'center';
      effectContainer.style.alignItems = 'center';
      
      gameSection.appendChild(effectContainer);

      if (charClass === 'warrior') {
        const slash1 = document.createElement('div');
        slash1.className = 'slash-effect';
        slash1.style.left = '50%';
        slash1.style.top = '50%';
        slash1.style.transformOrigin = 'left center';
        effectContainer.appendChild(slash1);

        setTimeout(() => {
          const slash2 = document.createElement('div');
          slash2.className = 'slash-effect';
          slash2.style.left = '50%';
          slash2.style.top = '50%';
          slash2.style.transformOrigin = 'left center';
          slash2.style.transform = 'rotate(-45deg)';
          effectContainer.appendChild(slash2);
        }, 150);
      } else if (charClass === 'mage') {
        const circle = document.createElement('div');
        circle.className = 'magic-circle';
        circle.style.left = '50%';
        circle.style.top = '50%';
        circle.style.transform = 'translate(-50%, -50%)';
        effectContainer.appendChild(circle);

        setTimeout(() => {
          const beam = document.createElement('div');
          beam.style.position = 'absolute';
          beam.style.width = '4px';
          beam.style.height = '100px';
          beam.style.background = 'linear-gradient(0deg, #9333ea, #a855f7, transparent)';
          beam.style.left = '50%';
          beam.style.top = '20%';
          beam.style.transform = 'translateX(-50%)';
          beam.style.boxShadow = '0 0 20px #9333ea';
          beam.style.animation = 'slash 0.3s ease-out forwards';
          effectContainer.appendChild(beam);
        }, 300);
      } else if (charClass === 'archer') {
        const arrow = document.createElement('div');
        arrow.className = 'arrow-projectile';
        arrow.textContent = '🏹';
        arrow.style.left = '20%';
        arrow.style.top = '50%';
        arrow.style.transform = 'translateY(-50%)';
        effectContainer.appendChild(arrow);
      }

      document.body.classList.add('shake');
      setTimeout(() => document.body.classList.remove('shake'), 200);

      setTimeout(() => {
        effectContainer.remove();
      }, 1000);
    }

    const SoundManager = {
      audioContext: null,
      muted: false,
      bgmPlayer: null,
      init: function() {
        try {
          this.audioContext = new (window.AudioContext || window.webkitAudioContext)();
        } catch (e) {
          console.log('Web Audio API not supported');
        }
        this.bgmPlayer = document.getElementById('bgmPlayer');
        this.muted = localStorage.getItem('koala_legend_muted') === 'true';
        this.updateMuteButton();
        if (this.bgmPlayer) {
          this.bgmPlayer.volume = 0.3;
        }
      },
      toggleMute: function() {
        this.muted = !this.muted;
        localStorage.setItem('koala_legend_muted', this.muted);
        this.updateMuteButton();
        if (this.bgmPlayer) {
          this.bgmPlayer.muted = this.muted;
        }
      },
      updateMuteButton: function() {
        const btn = document.getElementById('soundBtn');
        if (btn) {
          btn.innerHTML = this.muted ? '🔇' : '🎵';
          btn.title = this.muted ? '开启音效' : '关闭音效';
        }
      },
      playBGM: function() {
        if (!this.muted && this.bgmPlayer) {
          this.bgmPlayer.play().catch(e => {
            console.log('BGM play failed:', e);
          });
        }
      },
      pauseBGM: function() {
        if (this.bgmPlayer) {
          this.bgmPlayer.pause();
        }
      },
      playTone: function(frequency, duration, type = 'square', volume = 0.1) {
        if (this.muted || !this.audioContext) return;
        const oscillator = this.audioContext.createOscillator();
        const gainNode = this.audioContext.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(this.audioContext.destination);
        oscillator.type = type;
        oscillator.frequency.setValueAtTime(frequency, this.audioContext.currentTime);
        gainNode.gain.setValueAtTime(volume, this.audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, this.audioContext.currentTime + duration);
        oscillator.start(this.audioContext.currentTime);
        oscillator.stop(this.audioContext.currentTime + duration);
      },
      playAttack: function() {
        this.playTone(880, 0.15, 'sawtooth', 0.15);
        setTimeout(() => this.playTone(1320, 0.1, 'square', 0.1), 50);
      },
      playHit: function() {
        this.playTone(150, 0.3, 'sawtooth', 0.2);
        setTimeout(() => this.playTone(100, 0.2, 'square', 0.15), 100);
      },
      playVictory: function() {
        const notes = [523, 659, 784, 1047];
        notes.forEach((freq, i) => {
